services:

  # ── Shared infrastructure ────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── File storage (for Outline attachments/images) ────────────────────────────

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # MinIO bucket initializer — runs once, exits
  minio-init:
    image: minio/mc:latest
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/outline;
        mc anonymous set none local/outline;
        exit 0;
      "
    networks:
      - internal

  # ── Vikunja (task management) ────────────────────────────────────────────────
  # All-in-one image: API + frontend on port 3456
  # Docs: https://vikunja.io/docs/config-options/

  vikunja:
    image: vikunja/vikunja:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: postgres
      VIKUNJA_DATABASE_DATABASE: vikunja
      VIKUNJA_DATABASE_USER: ${POSTGRES_USER}
      VIKUNJA_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      VIKUNJA_REDIS_ENABLED: "true"
      VIKUNJA_REDIS_HOST: redis:6379
      VIKUNJA_SERVICE_PUBLICURL: https://${VIKUNJA_DOMAIN}
      VIKUNJA_SERVICE_JWTSECRET: ${VIKUNJA_JWT_SECRET}
      VIKUNJA_MAILER_ENABLED: ${SMTP_ENABLED:-false}
      VIKUNJA_MAILER_HOST: ${SMTP_HOST:-}
      VIKUNJA_MAILER_PORT: ${SMTP_PORT:-587}
      VIKUNJA_MAILER_USERNAME: ${SMTP_USER:-}
      VIKUNJA_MAILER_PASSWORD: ${SMTP_PASSWORD:-}
      VIKUNJA_MAILER_FROMEMAIL: ${SMTP_FROM:-}
    volumes:
      - vikunja_files:/app/vikunja/files
    ports:
      - "${VIKUNJA_PORT:-3456}:3456"
    networks:
      - internal

  # ── Outline (wiki / notes) ───────────────────────────────────────────────────
  # Docs: https://docs.getoutline.com/s/hosting/doc/docker-7pfeLP5a8t

  outline:
    image: outlinewiki/outline:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/outline
      REDIS_URL: redis://redis:6379
      URL: https://${OUTLINE_DOMAIN}
      PORT: "3000"
      SECRET_KEY: ${OUTLINE_SECRET_KEY}
      UTILS_SECRET: ${OUTLINE_UTILS_SECRET}
      # File storage via MinIO (S3-compatible)
      FILE_STORAGE: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      AWS_S3_UPLOAD_BUCKET_URL: http://minio:9000
      AWS_S3_UPLOAD_BUCKET_NAME: outline
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_S3_ACL: private
      # HAProxy terminates SSL — no HTTPS enforcement inside the stack
      FORCE_HTTPS: "false"
      PGSSLMODE: disable
      # Auth: configure at least one provider (OIDC shown; SMTP email below)
      # OIDC (e.g. Authentik, Keycloak, Google):
      OIDC_CLIENT_ID: ${OUTLINE_OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OUTLINE_OIDC_CLIENT_SECRET:-}
      OIDC_AUTH_URI: ${OUTLINE_OIDC_AUTH_URI:-}
      OIDC_TOKEN_URI: ${OUTLINE_OIDC_TOKEN_URI:-}
      OIDC_USERINFO_URI: ${OUTLINE_OIDC_USERINFO_URI:-}
      OIDC_USERNAME_CLAIM: email
      OIDC_DISPLAY_NAME: ${OUTLINE_OIDC_DISPLAY_NAME:-SSO}
      # SMTP (for email magic-link login)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM:-}
      SMTP_REPLY_EMAIL: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    ports:
      - "${OUTLINE_PORT:-3000}:3000"
    networks:
      - internal

volumes:
  postgres_data:
  vikunja_files:
  minio_data:

networks:
  internal:
    driver: bridge
