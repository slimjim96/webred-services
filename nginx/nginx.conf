worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile    on;
    tcp_nopush  on;
    server_tokens off;

    # ── Vikunja ───────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name tasks.*;

        client_max_body_size 20M;

        location / {
            proxy_pass         http://vikunja:3456;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support (live updates)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_read_timeout 300s;
        }
    }

    # ── Outline ───────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name wiki.*;

        client_max_body_size 100M;  # file/image uploads

        location / {
            proxy_pass         http://outline:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support (collaborative editing)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_read_timeout 300s;
        }
    }

    # ── Catch-all: reject unknown hostnames ───────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
