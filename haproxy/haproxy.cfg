# HAProxy configuration — webred-services
# Deployed on OPNsense (HAProxy plugin)
#
# Traffic flow (LAN only, no internet exposure):
#   LAN device → OPNsense HAProxy:443 → Debian VM → Docker containers
#
# SSL terminates here. Backends receive plain HTTP.
# Replace PLACEHOLDER_VM_IP and PLACEHOLDER_DOMAIN before use.
#
# Cert options (see docs/deployment.md):
#   A) Let's Encrypt via DNS-01 (requires real domain + Cloudflare DNS API)
#   B) Local CA via mkcert/step-ca (fully offline, no real domain needed)

# ── Global ────────────────────────────────────────────────────────────────────

global
    log         /dev/log local0
    log         /dev/log local1 notice
    maxconn     4096
    tune.ssl.default-dh-param 2048
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

# ── Defaults ──────────────────────────────────────────────────────────────────

defaults
    log         global
    mode        http
    option      httplog
    option      dontlognull
    option      forwardfor
    option      http-server-close
    timeout     connect     5s
    timeout     client      60s
    timeout     server      60s
    timeout     tunnel      3600s   # Required for WebSocket (Vikunja/Outline)

# ── Frontend: HTTP (port 80) — redirect to HTTPS ─────────────────────────────

frontend ft_http
    bind        *:80
    mode        http
    redirect    scheme https code 301

# ── Frontend: HTTPS (port 443) — SSL termination + routing ───────────────────

frontend ft_https
    bind        *:443 ssl crt /etc/ssl/haproxy/webred.pem alpn h2,http/1.1
    mode        http

    # Tell backends the original connection was HTTPS
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Real-IP %[src]

    # Host-based routing
    acl host_vikunja hdr(host) -i tasks.PLACEHOLDER_DOMAIN
    acl host_outline hdr(host) -i wiki.PLACEHOLDER_DOMAIN

    use_backend bk_vikunja if host_vikunja
    use_backend bk_outline  if host_outline

    default_backend bk_deny

# ── Backend: Vikunja ──────────────────────────────────────────────────────────

backend bk_vikunja
    mode        http
    balance     roundrobin
    option      httpchk GET /api/v1/info
    http-check  expect status 200
    server      vikunja PLACEHOLDER_VM_IP:3456 check inter 10s rise 2 fall 3

# ── Backend: Outline ──────────────────────────────────────────────────────────

backend bk_outline
    mode        http
    balance     roundrobin
    option      httpchk GET /_health
    http-check  expect status 200
    server      outline PLACEHOLDER_VM_IP:3000 check inter 10s rise 2 fall 3

# ── Backend: deny (catch-all) ─────────────────────────────────────────────────

backend bk_deny
    mode    http
    http-request deny deny_status 444
